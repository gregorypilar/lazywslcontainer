name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -ldflags "-s -w" -o lazywslcontainer.exe .

      - name: Compress
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          "lazywslcontainer v$tag" | Out-File -Encoding utf8 -NoNewline VERSION
          Compress-Archive -Path lazywslcontainer.exe, README.md, LICENSE, VERSION -DestinationPath "lazywslcontainer-${tag}-windows-amd64.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: lazywslcontainer-*.zip